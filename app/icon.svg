<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer disc ring -->
  <circle cx="14" cy="14" r="13" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Shine arc -->
  <path d="M 10 4 A 11 11 0 0 1 22 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Inner hub ring -->
  <circle cx="14" cy="14" r="5.5" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Centre hole -->
  <circle cx="14" cy="14" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <!-- DVD label box -->
  <rect x="15" y="21" width="16" height="10" rx="1" fill="white" stroke="currentColor" stroke-width="1.8"/>
  <text x="23" y="29" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="7.5" fill="currentColor" text-anchor="middle" letter-spacing="0.3">DVD</text>
</svg>
